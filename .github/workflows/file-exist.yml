name: file-exist
run-name: Check if file exists
on: [push]

jobs:
  find-file:
    runs-on: ubuntu-latest
    steps:
      - name: Search for file
        run: |
          FILE="./.gitconfig"
          if [ -f $FILE ]; then
            echo "file exists"
            exit 1
          else
            echo "file does not exist"
          fi